<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>Performance Planner</title>
    
    <!-- React & Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        
        :root {
            --bg: #FAFAFA;
            --card: #FFFFFF;
            --text-primary: #000000;
            --text-secondary: #666666;
            --border: #EAEAEA;
            --accent: #000000;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            -webkit-tap-highlight-color: transparent;
        }

        .selection-accent::selection {
            background: var(--accent);
            color: white;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #DDD;
            border-radius: 10px;
        }

        /* iOS safe area adjustments */
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: '#FAFAFA',
                        card: '#FFFFFF',
                        border: '#EAEAEA',
                        accent: '#000000',
                        text: {
                            primary: '#000000',
                            secondary: '#666666'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
</head>
<body class="selection-accent">
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useMemo, useCallback } = React;
        const { motion, AnimatePresence } = FramerMotion;

        // --- Types & Constants ---
        const DEFAULT_PLAN = [
            { day: 'Montag', title: 'Push (Kraft)', description: 'Brust, Schultern, Trizeps. Grundübungen mit hoher Intensität.', type: 'Strength' },
            { day: 'Dienstag', title: 'Intervalltraining', description: '4:15 min/km Pace. 8x800m mit 2min Pause.', type: 'Running' },
            { day: 'Mittwoch', title: 'Pull (Kraft)', description: 'Rücken, Bizeps. Fokus auf Klimmzüge und Rudern.', type: 'Strength' },
            { day: 'Donnerstag', title: 'Tempolauf', description: '10km in moderat-hohem Tempo. Zielpace: 4:45 min/km.', type: 'Running' },
            { day: 'Freitag', title: 'Legs (Kraft)', description: 'Kniebeugen, Kreuzheben. Maximalkraft-Fokus.', type: 'Strength' },
            { day: 'Samstag', title: 'Longrun', description: 'Grundlagenausdauer. 18-22km bei lockerem Tempo.', type: 'Running' },
            { day: 'Sonntag', title: 'Recovery', description: 'Schwimmen oder Mobility-Session. Aktive Regeneration.', type: 'Recovery' },
        ];

        const dayMap = {
            1: 'Montag', 2: 'Dienstag', 3: 'Mittwoch', 4: 'Donnerstag', 5: 'Freitag', 6: 'Samstag', 0: 'Sonntag'
        };

        const getISODate = (date) => date.toISOString().split('T')[0];
        const formatDate = (date) => {
            return new Intl.DateTimeFormat('de-DE', { 
                weekday: 'long', 
                day: 'numeric', 
                month: 'long' 
            }).format(date);
        };

        // --- Icon Component Wrapper ---
        const Icon = ({ name, size = 16, className = "" }) => {
            const iconRef = React.useRef(null);
            
            useEffect(() => {
                if (iconRef.current) {
                    const iconName = name.replace(/([A-Z])/g, (m) => `-${m.toLowerCase()}`).replace(/^-/, '');
                    const lucideName = iconName.charAt(0).toUpperCase() + name.slice(1);
                    
                    // Simple logic to draw via lucide
                    if (window.lucide && window.lucide.icons[name]) {
                        const svg = window.lucide.createIcons({
                            icons: { [name]: window.lucide.icons[name] },
                            attrs: { 
                                class: className, 
                                width: size, 
                                height: size,
                                'stroke-width': 2
                            }
                        });
                    }
                }
            }, [name, size, className]);

            // Alternative: use Lucide's createIcons or just manually render paths
            // For a standalone file, we can use the library's built-in React components if available, 
            // but standard Lucide is better for CDN. Let's use simple SVG mapping or use icons from library.
            
            // To keep it simple and reliable in one file, we'll use lucide.createIcons 
            // after render or standard SVGs. Let's try the dynamic approach:
            return <i data-lucide={name.toLowerCase().replace(/([a-z0-9])([a-z0-9]*)/g, (m) => m)} style={{ width: size, height: size, display: 'inline-block' }} className={className}></i>;
        };

        // Manually defining Lucide icons for React in standalone is tricky without a build step.
        // Let's use a simpler approach: raw SVG helper for the specific icons used.
        const LucideIcon = ({ name, size = 24, className = "" }) => {
            // Simplified: we'll use a script to replace tags at the end or use the official Lucide icons
            React.useEffect(() => {
                lucide.createIcons();
            });
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        // --- Main App ---
        function App() {
            const [activeTab, setActiveTab] = useState('heute');
            const [todos, setTodos] = useState(() => {
                const saved = localStorage.getItem('performance_todos');
                return saved ? JSON.parse(saved) : [];
            });
            const [plan, setPlan] = useState(() => {
                const saved = localStorage.getItem('performance_plan');
                return saved ? JSON.parse(saved) : DEFAULT_PLAN;
            });
            const [completedSessions, setCompletedSessions] = useState(() => {
                const saved = localStorage.getItem('performance_completed_sessions');
                return saved ? JSON.parse(saved) : [];
            });
            const [sessionOverrides, setSessionOverrides] = useState(() => {
                const saved = localStorage.getItem('performance_session_overrides');
                return saved ? JSON.parse(saved) : {};
            });
            
            const [addingContext, setAddingContext] = useState(null);
            const [newTodoText, setNewTodoText] = useState('');
            const [calendarFocusDate, setCalendarFocusDate] = useState(getISODate(new Date()));
            const [currentMonth, setCurrentMonth] = useState(new Date());

            useEffect(() => {
                localStorage.setItem('performance_todos', JSON.stringify(todos));
                localStorage.setItem('performance_plan', JSON.stringify(plan));
                localStorage.setItem('performance_completed_sessions', JSON.stringify(completedSessions));
                localStorage.setItem('performance_session_overrides', JSON.stringify(sessionOverrides));
                lucide.createIcons();
            }, [todos, plan, completedSessions, sessionOverrides]);

            const todayDate = new Date();
            const todayISO = getISODate(todayDate);

            const handleAddTodo = (date, category) => {
                if (!newTodoText.trim()) {
                    setAddingContext(null);
                    return;
                }
                const newTodo = {
                    id: crypto.randomUUID(),
                    text: newTodoText,
                    completed: false,
                    category,
                    date,
                };
                setTodos([...todos, newTodo]);
                setNewTodoText('');
                setAddingContext(null);
            };

            const toggleTodo = (id) => {
                setTodos(todos.map(t => t.id === id ? { ...t, completed: !t.completed } : t));
            };

            const deleteTodo = (id) => {
                setTodos(todos.filter(t => t.id !== id));
            };

            const toggleSessionCompletion = (dateStr) => {
                if (completedSessions.includes(dateStr)) {
                    setCompletedSessions(completedSessions.filter(d => d !== dateStr));
                } else {
                    setCompletedSessions([...completedSessions, dateStr]);
                }
            };

            const updatePlanDay = (day, updates) => {
                setPlan(plan.map(s => s.day === day ? { ...s, ...updates } : s));
            };

            const updateSessionOverride = (dateStr, updates) => {
                setSessionOverrides(prev => ({
                    ...prev,
                    [dateStr]: { ...prev[dateStr], ...updates }
                }));
            };

            const renderTodoSection = (dateStr, category) => {
                const sectionTodos = todos.filter(t => t.date === dateStr && t.category === category);
                const isAdding = addingContext?.date === dateStr && addingContext?.category === category;

                return (
                    <div className="space-y-2">
                        <div className="flex justify-between items-center group/cat">
                            <span className="text-[11px] font-bold text-text-secondary uppercase tracking-wider">{category}</span>
                            <button 
                                onClick={() => setAddingContext({ date: dateStr, category })}
                                className="opacity-0 group-hover/cat:opacity-100 p-1 hover:bg-card rounded transition-all"
                            >
                                <LucideIcon name="plus" size={12} />
                            </button>
                        </div>
                        <div className="space-y-1.5">
                            {sectionTodos.map(todo => (
                                <div key={todo.id} className="flex items-center gap-2 group/item">
                                    <button onClick={() => toggleTodo(todo.id)} className="shrink-0">
                                        <div className={`w-3.5 h-3.5 border rounded-[3px] flex items-center justify-center transition-colors ${
                                            todo.completed ? 'bg-accent border-accent' : 'border-[#DDD] group-hover/item:border-accent'
                                        }`}>
                                            {todo.completed && <LucideIcon name="check-circle-2" size={10} className="text-white" />}
                                        </div>
                                    </button>
                                    <span className={`text-[12px] leading-tight flex-1 ${todo.completed ? 'text-text-secondary line-through opacity-50' : 'text-text-primary'}`}>
                                        {todo.text}
                                    </span>
                                    <button onClick={() => deleteTodo(todo.id)} className="opacity-0 group-hover/item:opacity-100 text-gray-300 hover:text-red-500 transition-all">
                                        <LucideIcon name="trash-2" size={12} />
                                    </button>
                                </div>
                            ))}
                            {isAdding ? (
                                <div className="flex gap-1 pt-1">
                                    <input 
                                        autoFocus
                                        type="text"
                                        value={newTodoText}
                                        onChange={(e) => setNewTodoText(e.target.value)}
                                        onKeyDown={(e) => {
                                            if (e.key === 'Enter') handleAddTodo(dateStr, category);
                                            if (e.key === 'Escape') setAddingContext(null);
                                        }}
                                        className="flex-1 bg-card border border-border rounded px-1.5 py-0.5 text-[11px] outline-none"
                                    />
                                </div>
                            ) : sectionTodos.length === 0 && (
                                <button 
                                    onClick={() => setAddingContext({ date: dateStr, category })}
                                    className="text-[10px] text-text-secondary hover:text-accent font-medium transition-colors"
                                >
                                    + Hinzufügen
                                </button>
                            )}
                        </div>
                    </div>
                );
            };

            const todayDayName = dayMap[todayDate.getDay()];
            const todayOverride = sessionOverrides[todayISO];
            const todayBaseFocus = plan.find(s => s.day === todayDayName);
            const todayFocus = todayOverride ? { ...todayBaseFocus, ...todayOverride } : todayBaseFocus;
            const isTodayDone = completedSessions.includes(todayISO);

            const todayTodos = todos.filter(t => t.date === todayISO);
            const completedTodayTodos = todayTodos.filter(t => t.completed).length;
            const totalItems = todayTodos.length + (todayFocus && todayFocus.type !== 'Recovery' ? 1 : 0);
            const completedItems = completedTodayTodos + (isTodayDone && todayFocus?.type !== 'Recovery' ? 1 : 0);
            const successRate = totalItems > 0 ? (completedItems / totalItems) * 100 : 0;

            return (
                <div className="min-h-screen bg-bg text-text-primary font-sans">
                    {/* Header */}
                    <header className="px-6 sm:px-10 pt-10 sm:pt-16 pb-4 sticky top-0 bg-white/80 backdrop-blur-md z-10 border-b border-border/50">
                        <div className="max-w-6xl mx-auto flex justify-between items-start">
                            <div>
                                <p className="text-text-secondary text-sm font-medium mb-1">Performance Planner</p>
                                <motion.h1 
                                    initial={{ opacity: 0, y: 10 }}
                                    animate={{ opacity: 1, y: 0 }}
                                    className="text-2xl sm:text-3xl font-bold tracking-tight"
                                >
                                    {new Intl.DateTimeFormat('de-DE', { weekday: 'long', day: 'numeric', month: 'long' }).format(todayDate)}
                                </motion.h1>
                            </div>
                        </div>

                        <div className="max-w-6xl mx-auto flex gap-8 mt-10 text-center">
                            {['heute', 'kalender', 'settings'].map((tab) => (
                                <button
                                    key={tab}
                                    onClick={() => {
                                        setActiveTab(tab);
                                        setAddingContext(null);
                                    }}
                                    className={`pb-3 text-sm font-semibold transition-colors relative min-w-[80px] ${
                                        activeTab === tab ? 'text-text-primary' : 'text-text-secondary hover:text-text-primary'
                                    }`}
                                >
                                    {tab === 'heute' ? 'Heute' : tab === 'kalender' ? 'Kalender' : 'Optionen'}
                                    {activeTab === tab && (
                                        <motion.div 
                                            layoutId="activeTab"
                                            className="absolute bottom-[-1px] left-0 right-0 h-0.5 bg-accent" 
                                        />
                                    )}
                                </button>
                            ))}
                        </div>
                    </header>

                    <main className="px-6 sm:px-10 pb-24 max-w-6xl mx-auto mt-6">
                        <AnimatePresence mode="wait">
                            {activeTab === 'heute' && (
                                <motion.div
                                    key="heute"
                                    initial={{ opacity: 0, y: 10 }}
                                    animate={{ opacity: 1, y: 0 }}
                                    exit={{ opacity: 0, y: -10 }}
                                    className="grid lg:grid-cols-[320px_1fr] gap-8"
                                >
                                    <aside className="space-y-4">
                                        <section className="bg-card border border-border rounded-2xl p-6">
                                            <h2 className="text-[10px] uppercase tracking-widest text-text-secondary font-bold mb-4">Heutiger Fokus</h2>
                                            <div className="flex justify-between items-start mb-2">
                                                <h3 className="text-xl font-bold">{todayFocus?.title || 'Rest Day'}</h3>
                                                {todayFocus && (
                                                    <button 
                                                        onClick={() => toggleSessionCompletion(todayISO)}
                                                        className={`p-2 rounded-full transition-all ${
                                                            isTodayDone ? 'bg-[#2ECC71] text-white shadow-lg shadow-green-100' : 'bg-white border border-border text-gray-300 hover:text-accent'
                                                        }`}
                                                    >
                                                        <LucideIcon name="check-circle-2" size={18} />
                                                    </button>
                                                )}
                                            </div>
                                            <p className="text-text-secondary text-sm leading-relaxed">
                                                {todayFocus?.description}
                                            </p>
                                        </section>

                                        <section className="bg-transparent border border-border rounded-2xl p-6">
                                            <div className="flex justify-between items-center mb-4">
                                                <h2 className="text-[10px] uppercase tracking-widest text-text-secondary font-bold">Fortschritt</h2>
                                                <span className={`text-xs font-bold transition-colors ${Math.round(successRate) === 100 ? 'text-[#2ECC71]' : 'text-accent'}`}>
                                                    {Math.round(successRate)}%
                                                </span>
                                            </div>
                                            <div className="h-1 bg-border rounded-full overflow-hidden">
                                                <motion.div 
                                                    initial={false}
                                                    animate={{ 
                                                        width: `${successRate}%`,
                                                        backgroundColor: Math.round(successRate) === 100 ? '#2ECC71' : '#000000'
                                                    }} 
                                                    className="h-full" 
                                                />
                                            </div>
                                        </section>
                                    </aside>

                                    <section className="grid sm:grid-cols-2 gap-4 auto-rows-start">
                                        {['Uni', 'Sport', 'Arbeit', 'Sonstiges'].map((cat) => (
                                            <div key={cat} className="bg-white border border-border rounded-2xl p-6 flex flex-col gap-4 h-fit">
                                                {renderTodoSection(todayISO, cat)}
                                            </div>
                                        ))}
                                    </section>
                                </motion.div>
                            )}

                            {activeTab === 'kalender' && (
                                <motion.div
                                    key="kalender"
                                    initial={{ opacity: 0, y: 10 }}
                                    animate={{ opacity: 1, y: 0 }}
                                    exit={{ opacity: 0, y: -10 }}
                                    className="space-y-10"
                                >
                                    <div className="flex items-center justify-between max-w-sm mx-auto">
                                        <button 
                                            onClick={() => setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() - 1, 1))}
                                            className="p-2 hover:bg-card rounded-full transition-colors"
                                        >
                                            <LucideIcon name="chevron-left" size={20} />
                                        </button>
                                        <div className="flex flex-col items-center">
                                            <h2 className="text-xl font-bold">
                                                {new Intl.DateTimeFormat('de-DE', { month: 'long', year: 'numeric' }).format(currentMonth)}
                                            </h2>
                                            <button 
                                                onClick={() => {
                                                    const now = new Date();
                                                    setCurrentMonth(now);
                                                    setCalendarFocusDate(getISODate(now));
                                                }}
                                                className="text-[10px] font-bold uppercase tracking-widest text-accent mt-1 hover:underline"
                                            >
                                                Heute
                                            </button>
                                        </div>
                                        <button 
                                            onClick={() => setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 1))}
                                            className="p-2 hover:bg-card rounded-full transition-colors"
                                        >
                                            <LucideIcon name="chevron-right" size={20} />
                                        </button>
                                    </div>

                                    <div className="bg-white border border-border rounded-3xl p-6 max-w-sm mx-auto shadow-sm">
                                        <div className="grid grid-cols-7 gap-1 text-center mb-4">
                                            {['Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa', 'So'].map(d => (
                                                <span key={d} className="text-[10px] font-bold text-text-secondary uppercase">{d}</span>
                                            ))}
                                        </div>
                                        <div className="grid grid-cols-7 gap-1">
                                            {(() => {
                                                const firstDay = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), 1);
                                                const lastDay = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 0);
                                                const daysInMonth = lastDay.getDate();
                                                const startingDay = firstDay.getDay() === 0 ? 6 : firstDay.getDay() - 1;

                                                const items = [];
                                                for (let i = 0; i < startingDay; i++) {
                                                    items.push(<div key={`pad-${i}`} className="aspect-square" />);
                                                }
                                                for (let i = 1; i <= daysInMonth; i++) {
                                                    const d = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), i);
                                                    const dISO = getISODate(d);
                                                    const isSelected = calendarFocusDate === dISO;
                                                    const isToday = dISO === todayISO;
                                                    const hasTodos = todos.some(t => t.date === dISO);
                                                    const isDone = completedSessions.includes(dISO);

                                                    items.push(
                                                        <button
                                                            key={i}
                                                            onClick={() => setCalendarFocusDate(dISO)}
                                                            className={`aspect-square rounded-xl flex flex-col items-center justify-center text-xs font-medium transition-all relative ${
                                                                isSelected ? 'bg-accent text-white shadow-lg shadow-accent/20' : 
                                                                isToday ? 'bg-card text-accent font-bold ring-1 ring-accent/20' : 'hover:bg-card'
                                                            }`}
                                                        >
                                                            {i}
                                                            <div className="flex gap-0.5 mt-1">
                                                                {hasTodos && <div className={`w-1 h-1 rounded-full ${isSelected ? 'bg-white/60' : 'bg-gray-300'}`} />}
                                                                {isDone && <div className={`w-1 h-1 rounded-full ${isSelected ? 'bg-white' : 'bg-[#2ECC71]'}`} />}
                                                            </div>
                                                        </button>
                                                    );
                                                }
                                                return items;
                                            })()}
                                        </div>
                                    </div>

                                    <motion.div layout className="grid lg:grid-cols-[320px_1fr] gap-8 border-t border-border pt-10">
                                        <aside className="space-y-6">
                                            {(() => {
                                                const focusDate = new Date(calendarFocusDate);
                                                const focusDayName = dayMap[focusDate.getDay()];
                                                const override = sessionOverrides[calendarFocusDate];
                                                const baseSession = plan.find(s => s.day === focusDayName);
                                                const currentSession = override ? { ...baseSession, ...override } : baseSession;
                                                const isDone = completedSessions.includes(calendarFocusDate);

                                                return (
                                                    <section className="bg-card border border-border rounded-2xl p-6 shadow-sm">
                                                        <div className="flex justify-between items-center mb-4">
                                                            <h2 className="text-[10px] uppercase tracking-widest text-text-secondary font-bold">
                                                                {calendarFocusDate === todayISO ? 'Heute' : formatDate(focusDate)}
                                                            </h2>
                                                            {currentSession && (
                                                                <button 
                                                                    onClick={() => toggleSessionCompletion(calendarFocusDate)}
                                                                    className={`p-1.5 rounded-full transition-all ${isDone ? 'bg-[#2ECC71] text-white' : 'text-gray-300 hover:text-accent'}`}
                                                                >
                                                                    <LucideIcon name="check-circle-2" size={16} />
                                                                </button>
                                                            )}
                                                        </div>
                                                        <div className="space-y-4">
                                                            <input 
                                                                type="text"
                                                                value={currentSession?.title || ''}
                                                                onChange={(e) => updateSessionOverride(calendarFocusDate, { title: e.target.value })}
                                                                className="w-full bg-bg border border-border rounded-xl px-4 py-2 text-sm font-bold outline-none focus:border-accent"
                                                                placeholder="Kein Workout"
                                                            />
                                                            <select 
                                                                value={currentSession?.type || 'Recovery'}
                                                                onChange={(e) => updateSessionOverride(calendarFocusDate, { type: e.target.value })}
                                                                className="w-full bg-bg border border-border rounded-xl px-3 py-2 text-xs font-semibold outline-none focus:border-accent"
                                                            >
                                                                <option value="Strength">Kraft</option>
                                                                <option value="Running">Ausdauer</option>
                                                                <option value="Recovery">Erholung</option>
                                                            </select>
                                                            <textarea 
                                                                value={currentSession?.description || ''}
                                                                onChange={(e) => updateSessionOverride(calendarFocusDate, { description: e.target.value })}
                                                                className="w-full bg-bg border border-border rounded-xl px-4 py-2 text-xs outline-none focus:border-accent h-24 resize-none"
                                                                placeholder="Notizen..."
                                                            />
                                                            {override && (
                                                                <button 
                                                                    onClick={() => {
                                                                        const next = { ...sessionOverrides };
                                                                        delete next[calendarFocusDate];
                                                                        setSessionOverrides(next);
                                                                    }}
                                                                    className="text-[9px] text-red-500 font-bold uppercase tracking-widest hover:underline"
                                                                >
                                                                    Anpassung löschen
                                                                </button>
                                                            )}
                                                        </div>
                                                    </section>
                                                );
                                            })()}
                                        </aside>

                                        <section className="grid sm:grid-cols-2 gap-4 auto-rows-start">
                                            {['Uni', 'Sport', 'Arbeit', 'Sonstiges'].map((cat) => (
                                                <div key={cat} className="bg-white border border-border rounded-2xl p-6 flex flex-col gap-4 h-fit shadow-sm">
                                                    {renderTodoSection(calendarFocusDate, cat)}
                                                </div>
                                            ))}
                                        </section>
                                    </motion.div>
                                </motion.div>
                            )}

                            {activeTab === 'settings' && (
                                <motion.div
                                    key="settings"
                                    initial={{ opacity: 0, y: 10 }}
                                    animate={{ opacity: 1, y: 0 }}
                                    exit={{ opacity: 0, y: -10 }}
                                    className="max-w-3xl mx-auto space-y-8"
                                >
                                    <div className="bg-white border border-border rounded-3xl p-8 shadow-sm">
                                        <h2 className="text-xl font-bold mb-6">Standard Wochenplan</h2>
                                        <div className="space-y-6">
                                            {plan.map((session) => (
                                                <div key={session.day} className="grid sm:grid-cols-[100px_1fr] gap-4 items-start pb-6 border-b border-border last:border-0 last:pb-0">
                                                    <span className="font-mono text-[11px] uppercase tracking-widest font-bold pt-2 text-text-secondary">{session.day}</span>
                                                    <div className="space-y-3">
                                                        <input 
                                                            type="text" 
                                                            value={session.title}
                                                            onChange={(e) => updatePlanDay(session.day, { title: e.target.value })}
                                                            className="w-full bg-card border border-border rounded-xl px-4 py-2 text-sm font-bold outline-none focus:border-accent transition-colors"
                                                        />
                                                        <div className="flex gap-2">
                                                            <select 
                                                                value={session.type}
                                                                onChange={(e) => updatePlanDay(session.day, { type: e.target.value })}
                                                                className="bg-card border border-border rounded-xl px-3 py-2 text-xs font-semibold outline-none focus:border-accent"
                                                            >
                                                                <option value="Strength">Kraft</option>
                                                                <option value="Running">Ausdauer</option>
                                                                <option value="Recovery">Erholung</option>
                                                            </select>
                                                            <input 
                                                                type="text" 
                                                                value={session.description}
                                                                onChange={(e) => updatePlanDay(session.day, { description: e.target.value })}
                                                                className="flex-1 bg-card border border-border rounded-xl px-4 py-2 text-xs outline-none focus:border-accent transition-colors"
                                                            />
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="p-8 bg-card border border-border rounded-3xl shadow-sm">
                                        <h3 className="font-bold mb-2">Daten zurücksetzen</h3>
                                        <button 
                                            onClick={() => {
                                                if (confirm('Alle Daten löschen?')) {
                                                    localStorage.clear();
                                                    window.location.reload();
                                                }
                                            }}
                                            className="px-4 py-2 border border-red-200 text-red-500 text-[10px] font-bold uppercase tracking-widest rounded-xl hover:bg-red-50 transition-colors"
                                        >
                                            Reset
                                        </button>
                                    </div>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Navigation fix for standalone mode
        (function(a,b,c){if(c in b&&b[c]){var d,e=a.location,f=/^(a|html)$/i;a.addEventListener("click",function(a){d=a.target;while(!f.test(d.nodeName))d=d.parentNode;"href"in d&&(d.href.indexOf("http")||~d.href.indexOf(e.host))&&(a.preventDefault(),e.href=d.href)},!1)}})(document,window.navigator,"standalone");
    </script>
</body>
</html>
