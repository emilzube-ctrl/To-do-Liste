<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Performance Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #ffffff; }
        .safe-top { padding-top: env(safe-area-inset-top); }
        .card { background: #f9f9f9; border: 1px solid #eeeeee; border-radius: 16px; transition: all 0.2s; }
        .tab-active { border-bottom: 2px solid #000; font-weight: 600; }
        input:checked + label { text-decoration: line-through; color: #999; }
        .progress-green { color: #10b981 !important; }
        .bg-progress-green { background-color: #10b981 !important; }
    </style>
</head>
<body class="safe-top text-gray-900">
    <div class="px-6 py-4 flex justify-between items-center">
        <h1 id="currentDate" class="text-lg font-semibold tracking-tight"></h1>
    </div>

    <div class="flex px-6 border-b border-gray-100 mb-6">
        <button onclick="switchTab('heute')" id="tab-heute" class="py-2 mr-6 tab-active">Heute</button>
        <button onclick="switchTab('kalender')" id="tab-kalender" class="py-2 mr-6 text-gray-400">Kalender</button>
        <button onclick="switchTab('settings')" id="tab-settings" class="py-2 text-gray-400">Einstellungen</button>
    </div>

    <div id="content-heute" class="px-6 space-y-6">
        <div class="card p-5">
            <p class="text-[10px] uppercase tracking-widest text-gray-400 mb-1">Heutiger Fokus</p>
            <h2 id="todayWorkout" class="text-xl font-bold">Laden...</h2>
        </div>

        <div class="flex justify-between items-end">
            <h3 class="text-2xl font-bold">Fortschritt</h3>
            <span id="progressText" class="text-2xl font-bold">0%</span>
        </div>
        <div class="w-full bg-gray-100 h-2 rounded-full overflow-hidden">
            <div id="progressBar" class="bg-black h-full transition-all duration-500" style="width: 0%"></div>
        </div>

        <div id="todoSections" class="space-y-6 pb-20">
            </div>
    </div>

    <div id="content-kalender" class="hidden px-6">
        <h2 class="text-xl font-bold mb-4">Kalender</h2>
        <div id="calendarGrid" class="grid grid-cols-7 gap-2 mb-4 text-center"></div>
        <div id="dayDetail" class="card p-4 hidden">
            <h3 id="selectedDateText" class="font-bold mb-4"></h3>
            <div id="dayTodos"></div>
        </div>
    </div>

    <div id="content-settings" class="hidden px-6">
        <h2 class="text-xl font-bold mb-4">Einstellungen</h2>
        <p class="text-gray-500">Hier kannst du bald deinen Standard-Plan anpassen.</p>
    </div>

    <script>
        let state = JSON.parse(localStorage.getItem('plannerState')) || {
            todos: {},
            workouts: { 'Mon': 'Push', 'Tue': 'Laufen (Intervalle)', 'Wed': 'Pull', 'Thu': 'Laufen (Tempo)', 'Fri': 'Legs', 'Sat': 'Longrun', 'Sun': 'Schwimmen' }
        };

        const categories = ['Uni', 'Sport', 'Arbeit', 'Sonstiges'];

        function init() {
            const today = new Date();
            document.getElementById('currentDate').innerText = today.toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long' });
            renderTodos();
            updateWorkout();
            updateProgress();
        }

        function switchTab(tab) {
            ['heute', 'kalender', 'settings'].forEach(t => {
                document.getElementById('content-' + t).classList.add('hidden');
                document.getElementById('tab-' + t).classList.remove('tab-active', 'text-gray-900');
                document.getElementById('tab-' + t).classList.add('text-gray-400');
            });
            document.getElementById('content-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab).classList.add('tab-active', 'text-gray-900');
        }

        function renderTodos() {
            const container = document.getElementById('todoSections');
            container.innerHTML = '';
            const dateKey = getTodayKey();
            
            categories.forEach(cat => {
                const section = document.createElement('div');
                section.className = 'space-y-3';
                section.innerHTML = `
                    <div class="flex justify-between items-center">
                        <h4 class="font-semibold text-gray-400 text-sm uppercase tracking-wider">${cat}</h4>
                        <button onclick="addTodo('${cat}')" class="text-xl">+</button>
                    </div>
                    <div id="list-${cat}" class="space-y-2"></div>
                `;
                container.appendChild(section);
                renderCategoryItems(cat, dateKey);
            });
        }

        function renderCategoryItems(cat, dateKey) {
            const list = document.getElementById('list-' + cat);
            list.innerHTML = '';
            const items = (state.todos[dateKey] && state.todos[dateKey][cat]) || [];
            
            items.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'flex items-center space-x-3 p-1';
                div.innerHTML = `
                    <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggleTodo('${cat}', ${idx})" class="w-5 h-5 rounded-full border-gray-300 accent-black">
                    <label class="flex-grow">${item.text}</label>
                `;
                list.appendChild(div);
            });
        }

        function addTodo(cat) {
            const text = prompt(`${cat}: Was steht an?`);
            if (!text) return;
            const dateKey = getTodayKey();
            if (!state.todos[dateKey]) state.todos[dateKey] = {};
            if (!state.todos[dateKey][cat]) state.todos[dateKey][cat] = [];
            state.todos[dateKey][cat].push({ text, done: false });
            save();
            renderTodos();
            updateProgress();
        }

        function toggleTodo(cat, idx) {
            const dateKey = getTodayKey();
            state.todos[dateKey][cat][idx].done = !state.todos[dateKey][cat][idx].done;
            save();
            updateProgress();
        }

        function updateProgress() {
            const dateKey = getTodayKey();
            const dayTodos = state.todos[dateKey];
            let total = 0, done = 0;
            if (dayTodos) {
                Object.values(dayTodos).flat().forEach(t => {
                    total++;
                    if (t.done) done++;
                });
            }
            const percent = total === 0 ? 0 : Math.round((done / total) * 100);
            const textEl = document.getElementById('progressText');
            const barEl = document.getElementById('progressBar');
            
            textEl.innerText = percent + '%';
            barEl.style.width = percent + '%';

            if (percent === 100 && total > 0) {
                textEl.classList.add('progress-green');
                barEl.classList.add('bg-progress-green');
            } else {
                textEl.classList.remove('progress-green');
                barEl.classList.remove('bg-progress-green');
            }
        }

        function updateWorkout() {
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const dayName = days[new Date().getDay()];
            document.getElementById('todayWorkout').innerText = state.workouts[dayName] || 'Rest Day';
        }

        function getTodayKey() { return new Date().toISOString().split('T')[0]; }
        function save() { localStorage.setItem('plannerState', JSON.stringify(state)); }

        // iOS PWA Stay-in-App Script
        (function(a,b,c){if(c in b&&b[c]){var d,e=a.location,f=/^(a|html)$/i;a.addEventListener("click",function(a){d=a.target;while(!f.test(d.nodeName))d=d.parentNode;"href"in d&&(d.href.indexOf("http")||~d.href.indexOf(e.host))&&(a.preventDefault(),e.href=d.href)},!1)}})(document,window.navigator,"standalone");

        init();
    </script>
</body>
</html>
